<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deutsch Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Deutsch Trainer</p>
        <h1>Substantive mit Präpositionen</h1>
      </div>
      <div class="topbar-actions">
        <label class="select-wrap">
          <span>Тема</span>
          <select id="categoryFilter"></select>
        </label>
        <div class="score-card">
          <span>Прогресс</span>
          <strong id="scoreText">0 / 0</strong>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="card question-card">
        <div class="card-head">
          <div>
            <p class="muted">Задание</p>
            <h2 id="questionNumber">Вопрос 1</h2>
          </div>
          <div class="pill" id="modeLabel">Выбери правильный предлог</div>
        </div>

        <div id="questionBlock" class="question-block">
          <div class="question-de" id="questionText"></div>
          <div class="question-ru" id="questionTranslation"></div>
        </div>

        <div id="answers" class="answers"></div>

        <div class="nav-row">
          <button id="prevBtn" class="btn btn-secondary">← Назад</button>
          <button id="shuffleBtn" class="btn btn-ghost">Перемешать ответы</button>
          <button id="nextBtn" class="btn btn-primary">Дальше →</button>
        </div>
      </section>

      <aside class="card info-card">
        <div class="card-head right-head">
          <div>
            <p class="muted">Информация</p>
            <h2 id="infoPhrase">Выбери ответ</h2>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">Перевод</div>
            <div id="infoTranslation" class="info-value">Перевод появится здесь.</div>
          </div>

          <div class="info-item">
            <div class="info-label">Пример</div>
            <div id="infoExample" class="info-value">—</div>
            <div id="infoExampleRu" class="info-subvalue">—</div>
          </div>

          <div class="info-item">
            <div class="info-label">Этимология</div>
            <div id="infoEtymology" class="info-value">—</div>
          </div>

          <div class="info-item">
            <div class="info-label">Использование</div>
            <div id="infoUsage" class="info-value">—</div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
